template:
  name: cobuilder-lifecycle
  version: "2.0"
  description: >
    Self-driving CoBuilder Guardian lifecycle: research -> refine (with AT/HR gates) ->
    plan (with AT/HR gates) -> execute -> lint check -> validate (with AT/HR gates) -> close.
    Each codergen node has downstream wait.cobuilder + wait.human gates.
    Lint check (ruff + pylint) runs between execute and validation, using the target
    repo's own ruff.toml. Enabled by default; disable with enable_lint_check=false.
    Passes strict validator. v2.1 adds lint enforcement node (PRD-LINT-ENFORCEMENT-001 E1).
  topology: linear
  min_nodes: 14
  max_nodes: 19

parameters:
  initiative_id:
    type: string
    required: true
    description: "Initiative identifier (e.g., INIT-AUTH-001)"
  business_spec_path:
    type: string
    required: true
    description: "Path to the Business Spec (BS) markdown file"
  target_dir:
    type: string
    required: true
    description: "Path to the target repository/directory"
  max_cycles:
    type: integer
    required: false
    default: 3
    description: "Maximum full research-to-evaluate cycles before forced exit"
  execution_template:
    type: string
    required: false
    default: "hub-spoke"
    description: "Template to use for child pipelines generated by PLAN"
  require_human_before_launch:
    type: boolean
    required: false
    default: true
    description: "Require human approval via wait.human before EXECUTE"
  model_research:
    type: string
    required: false
    default: "haiku"
    description: "Model for research node"
  model_refine:
    type: string
    required: false
    default: "opus"
    description: "Model for refinement node"
  model_plan:
    type: string
    required: false
    default: "opus"
    description: "Model for planning node"
  model_execute:
    type: string
    required: false
    default: "alibaba-glm5"
    description: "Model for execution/implementation node"
  cobuilder_root:
    type: string
    required: false
    default: "/path/to/harness"
    description: "Absolute path to the CoBuilder harness root"
  research_queries:
    type: string
    required: false
    default: ""
    description: "Comma-separated framework/topic queries for research node"
  enable_lint_check:
    type: boolean
    required: false
    default: true
    description: "Insert a lint check (ruff + pylint) tool node between execute and validation. Runs against the target repo's ruff.toml config."
  model_lint:
    type: string
    required: false
    default: "anthropic-fast"
    description: "Model for lint check node (Haiku recommended — mechanical task)"

defaults:
  llm_profile: "anthropic-fast"
  handler_defaults:
    research:
      llm_profile: "anthropic-fast"
    codergen:
      llm_profile: "anthropic-smart"

constraints:
  lifecycle_transitions:
    description: "Allowed status transitions for lifecycle LLM nodes"
    type: node_state_machine
    applies_to:
      shape: box
    states: [pending, active, completed, failed]
    transitions:
      - {from: pending, to: active}
      - {from: active, to: completed}
      - {from: active, to: failed}
      - {from: failed, to: active}
    initial: pending
    terminal: [completed, failed]

  bounded_lifecycle:
    description: "Limit total cycles to prevent runaway loops"
    type: loop_constraint
    rule:
      max_per_node_visits: 4
      max_pipeline_visits: 35

  must_validate_before_close:
    description: "Execute must pass through validate before reaching close"
    type: path_constraint
    rule:
      from_shape: house
      must_pass_through:
        - hexagon
      before_reaching:
        - Msquare